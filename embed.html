  </div>

  <script>
    const btn = document.getElementById('wGo');
    const inp = document.getElementById('wUrl');
    const out = document.getElementById('wOut');
    const err = document.getElementById('wErr');

    function setLoading(on) {
      btn.disabled = on;
      btn.innerHTML = on
        ? '<span class="spin"></span> Läuft…'
        : '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg> Prüfen';
    }

    function colorVal(ok) {
      return ok ? '#c8f135' : '#f87171';
    }

    async function run() {
      const url = inp.value.trim();
      err.classList.add('hidden');
      if (!url) { err.textContent = 'Bitte URL eingeben.'; err.classList.remove('hidden'); return; }
      if (!/^https?:\/\//i.test(url)) { inp.value = 'https://' + url; return run(); }

      setLoading(true);
      out.classList.add('hidden');

      try {
        const bridge = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
        const t0 = performance.now();
        const r = await fetch(bridge);
        const ms = Math.round(performance.now() - t0);
        const j = await r.json();
        const html = j.contents || '';
        const code = j.status?.http_code ?? '—';

        const doc = new DOMParser().parseFromString(html, 'text/html');
        const hasTitle = !!doc.querySelector('title')?.textContent?.trim();
        const hasMeta  = [...doc.querySelectorAll('meta')].some(m =>
          (m.getAttribute('name') || '').toLowerCase() === 'description' && m.getAttribute('content')
        );
        const hasH1   = !!doc.querySelector('h1');
        let https = false;
        try { https = new URL(url).protocol === 'https:'; } catch(_) {}

        const checks = [
          { label: 'HTTPS',        ok: https,    val: https ? 'Ja ✓' : 'Nein ✗' },
          { label: 'Title',        ok: hasTitle, val: hasTitle ? 'Vorhanden' : 'Fehlt' },
          { label: 'Meta-Desc.',   ok: hasMeta,  val: hasMeta ? 'Vorhanden' : 'Fehlt' },
          { label: 'H1',           ok: hasH1,    val: hasH1 ? 'Vorhanden' : 'Fehlt' },
          { label: 'HTTP-Status',  ok: String(code) === '200', val: String(code) },
          { label: 'Ladezeit',     ok: ms < 4000, val: ms + ' ms' },
        ];

        const score = Math.round((checks.filter(c => c.ok).length / checks.length) * 100);
        const scoreColor = score >= 80 ? '#c8f135' : score >= 50 ? '#fbbf24' : '#f87171';

        out.innerHTML = `
          <div style="display:flex;align-items:center;gap:12px;padding:12px;background:rgba(0,0,0,.4);border:1px solid #27272a;border-radius:10px;margin-bottom:10px;">
            <div style="text-align:center;min-width:48px;">
              <div style="font-size:1.6rem;font-weight:800;color:${scoreColor};font-family:monospace;line-height:1;">${score}</div>
              <div style="font-size:9px;color:#52525b;text-transform:uppercase;letter-spacing:.08em;">/100</div>
            </div>
            <div style="flex:1;">
              <div style="font-size:11px;font-weight:600;color:#fff;margin-bottom:4px;">Quick-Score</div>
              <div style="height:4px;background:#27272a;border-radius:2px;overflow:hidden;">
                <div style="height:100%;background:${scoreColor};width:${score}%;border-radius:2px;"></div>
              </div>
            </div>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;">
            ${checks.map(c => `
              <div style="padding:8px 10px;background:rgba(0,0,0,.3);border:1px solid ${c.ok ? 'rgba(200,241,53,.15)' : 'rgba(248,113,113,.15)'};border-radius:8px;">
                <div style="font-size:9px;color:#71717a;text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px;">${c.label}</div>
                <div style="font-size:12px;font-weight:600;color:${colorVal(c.ok)};font-family:monospace;">${c.val}</div>
              </div>`).join('')}
          </div>
          <a href="https://theodorluke1-debug.github.io/AuditFlow/" target="_blank" rel="noopener"
            style="display:block;margin-top:10px;padding:9px;background:#c8f135;color:#030303;border-radius:10px;text-align:center;font-size:12px;font-weight:700;text-decoration:none;">
            Vollständigen Report erstellen →
          </a>`;
        out.classList.remove('hidden');

      } catch(e) {
        err.textContent = 'Seite konnte nicht analysiert werden. Andere URL versuchen.';
        err.classList.remove('hidden');
      } finally {
        setLoading(false);
      }
    }

    btn.addEventListener('click', run);
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') run(); });
  </script>

</body>
