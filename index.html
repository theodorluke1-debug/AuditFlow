<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="QueryLogic — AI website audit tool. Analyzes SEO, UX, Performance, Accessibility and Conversion in 30 seconds.">
<title>QueryLogic App — AI Website Auditor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --lime: #c8f135;
    --lime-soft: rgba(200, 241, 53, 0.1);
    --bg: #0d0d0b;
    --bg-card: #131310;
    --bg-elevated: #1a1a16;
    --border: #2a2a24;
    --border-bright: #3a3a30;
    --text: #e8e8e0;
    --text-dim: #9b9b90;
    --text-muted: #606058;
    --error: #f87171;
    --shadow: 0 8px 32px rgba(0,0,0,0.5);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    line-height: 1.5;
    overflow-x: hidden;
  }

  /* Typography */
  h1, h2, h3 { font-family: 'Inter', sans-serif; font-weight: 700; letter-spacing: -0.02em; }
  .serif { font-family: 'DM Serif Display', serif; }

  /* Header */
  header {
    height: 64px;
    padding: 0 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(13, 13, 11, 0.8);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 1000;
  }

  .logo { font-weight: 800; font-size: 1.1rem; letter-spacing: -0.03em; text-transform: uppercase; }
  .logo span { color: var(--lime); }

  /* Main Layout */
  .app-container {
    max-width: 1100px;
    margin: 40px auto;
    padding: 0 20px;
  }

  .audit-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px;
    text-align: center;
    box-shadow: var(--shadow);
    margin-bottom: 32px;
  }

  .audit-card h1 { font-size: 2.5rem; margin-bottom: 12px; }
  .audit-card p { color: var(--text-dim); margin-bottom: 32px; max-width: 600px; margin-inline: auto; }

  .input-wrapper {
    display: flex;
    background: var(--bg-elevated);
    border: 1px solid var(--border-bright);
    padding: 8px;
    border-radius: 14px;
    gap: 8px;
    max-width: 700px;
    margin: 0 auto 24px auto;
    transition: border-color 0.2s;
  }
  .input-wrapper:focus-within { border-color: var(--lime); }

  input[type="url"] {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text);
    padding: 0 16px;
    font-size: 1rem;
    outline: none;
  }

  .btn-primary {
    background: var(--lime);
    color: #000;
    border: none;
    padding: 12px 28px;
    border-radius: 10px;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.2s;
  }
  .btn-primary:hover { opacity: 0.9; }
  .btn-primary:active { transform: scale(0.97); }
  .btn-primary:disabled { background: var(--text-muted); cursor: not-allowed; }

  /* API Key Input */
  .api-key-container {
    font-size: 0.8rem;
    color: var(--text-muted);
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
  }
  .api-key-container input {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    border-radius: 4px;
    padding: 2px 8px;
    width: 150px;
  }

  /* Results Grid */
  .results-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 20px;
    margin-top: 40px;
    opacity: 0;
    transform: translateY(20px);
    transition: all 0.5s ease;
  }
  .results-grid.visible { opacity: 1; transform: translateY(0); }

  .result-item {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
  }

  .score-circle {
    width: 48px;
    height: 48px;
    border: 2px solid var(--lime);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    color: var(--lime);
    margin-bottom: 16px;
  }

  #error-display {
    display: none;
    background: rgba(248, 113, 113, 0.1);
    color: var(--error);
    border: 1px solid var(--error);
    padding: 16px;
    border-radius: 12px;
    margin-bottom: 24px;
    text-align: center;
    font-size: 0.9rem;
  }

  footer {
    padding: 60px 20px;
    border-top: 1px solid var(--border);
    text-align: center;
    color: var(--text-muted);
    font-size: 0.85rem;
  }
  .legal-links { margin-top: 12px; display: flex; justify-content: center; gap: 20px; }
  .legal-links a { color: var(--text-dim); text-decoration: none; cursor: pointer; }
  .legal-links a:hover { color: var(--lime); }
</style>
</head>
<body>

<header>
  <div class="logo">QUERY<span>LOGIC</span></div>
  <div style="font-size: 0.8rem; background: var(--lime-soft); color: var(--lime); padding: 4px 10px; border-radius: 20px; font-weight: 600;">BETA 2.1</div>
</header>

<div class="app-container">
  <div id="error-display"></div>

  <div class="audit-card">
    <h1 class="serif">Audit your website with <span style="color:var(--lime)">Precision.</span></h1>
    <p>Get forensic analysis and AI-generated code fixes for SEO, performance, and conversion in seconds.</p>
    
    <div class="input-wrapper">
      <input type="url" id="target-url" placeholder="https://example.com" required>
      <button class="btn-primary" id="audit-btn" onclick="startAudit()">Run Deep Audit</button>
    </div>

    <div class="api-key-container">
      <span>API KEY:</span>
      <input type="password" id="api-key" placeholder="AIza...">
      <span style="opacity: 0.5;">(Stored locally)</span>
    </div>
  </div>

  <div id="results-grid" class="results-grid">
    <!-- Results will appear here -->
  </div>
</div>

<footer>
  <p>&copy; 2026 QueryLogic by Theodor Luke. All rights reserved.</p>
  <div class="legal-links">
    <a onclick="showLegal('impressum')">Impressum</a>
    <a onclick="showLegal('datenschutz')">Privacy Policy</a>
  </div>
</footer>

<script>
/* ── CONFIGURATION & FALLBACKS ────────────────────────────── */
// Wir nutzen jetzt spezifischere Namen, die bei Google stabiler sind
const MODEL_CHAIN = [
  "gemini-1.5-flash-latest",
  "gemini-1.5-flash",
  "gemini-1.5-pro-latest"
];

/* ── STABILE API LOGIK ────────────────────────────────────── */
async function callGemini(prompt, systemInstruction, apiKey) {
  let lastError = "";

  for (const model of MODEL_CHAIN) {
    try {
      // Nutze v1beta für volle Feature-Unterstützung
      const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
      
      const response = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [{ text: prompt }] }],
          systemInstruction: { parts: [{ text: systemInstruction }] },
          generationConfig: {
            responseMimeType: "application/json",
            temperature: 0.1
          }
        })
      });

      if (response.status === 404) {
        console.warn(`Modell ${model} nicht gefunden, versuche nächstes...`);
        continue; 
      }

      if (!response.ok) {
        const errData = await response.json();
        throw new Error(errData.error?.message || `HTTP ${response.status}`);
      }

      const data = await response.json();
      let text = data.candidates?.[0]?.content?.parts?.[0]?.text;
      
      if (!text) throw new Error("Empty AI response");

      // Robustes JSON-Parsing (entfernt Markdown Fences)
      const cleanJson = text.replace(/```json/g, "").replace(/```/g, "").trim();
      return JSON.parse(cleanJson);

    } catch (err) {
      console.error(`Error with ${model}:`, err.message);
      lastError = err.message;
      // Kurze Pause vor dem nächsten Modell
      await new Promise(r => setTimeout(r, 1000));
    }
  }
  throw new Error(`Audit failed. Last error: ${lastError}`);
}

/* ── UI LOGIK ─────────────────────────────────────────────── */
async function startAudit() {
  const url = document.getElementById('target-url').value;
  const apiKey = document.getElementById('api-key').value || localStorage.getItem('gemini_api_key');
  const btn = document.getElementById('audit-btn');
  const errorBox = document.getElementById('error-display');
  const grid = document.getElementById('results-grid');

  if (!url) return alert("Please enter a URL");
  if (!apiKey) return alert("Please enter your Gemini API Key");

  localStorage.setItem('gemini_api_key', apiKey);
  errorBox.style.display = 'none';
  grid.classList.remove('visible');

  try {
    btn.disabled = true;
    btn.innerText = "Analyzing Page...";

    // Mock-HTML (Du müsstest hier deinen Scraper-Dienst anbinden)
    const mockContent = `HTML content for ${url}`;

    const systemPrompt = "You are a professional web auditor. Analyze the HTML for SEO, Performance, Design and Code. Return ONLY a JSON object with scores (0-100) and short findings.";
    const userPrompt = `Audit this website: ${mockContent}. Provide a JSON response with keys: seo_score, perf_score, design_score, code_score, summary.`;

    const report = await callGemini(userPrompt, systemPrompt, apiKey);
    
    // UI rendern
    grid.innerHTML = `
      <div class="result-item">
        <div class="score-circle">${report.seo_score}</div>
        <h3>Search Engine Optimization</h3>
        <p style="color:var(--text-dim); font-size:0.85rem; margin-top:8px;">${report.summary}</p>
      </div>
      <div class="result-item">
        <div class="score-circle">${report.perf_score}</div>
        <h3>Performance & Speed</h3>
        <p style="color:var(--text-dim); font-size:0.85rem; margin-top:8px;">Load times and resource optimization.</p>
      </div>
      <div class="result-item">
        <div class="score-circle">${report.design_score}</div>
        <h3>Design & UX</h3>
        <p style="color:var(--text-dim); font-size:0.85rem; margin-top:8px;">Visual hierarchy and user flow.</p>
      </div>
    `;
    grid.classList.add('visible');

  } catch (err) {
    errorBox.style.display = 'block';
    errorBox.innerText = err.message;
  } finally {
    btn.disabled = false;
    btn.innerText = "Run Deep Audit";
  }
}

function showLegal(type) {
  alert(type === 'impressum' ? "Theodor Luke, Am Hasensprung 85, 60437 Frankfurt. Repräsentiert durch Alexander Luke." : "Your API Key is only stored in your browser's local storage.");
}

window.onload = () => {
  const key = localStorage.getItem('gemini_api_key');
  if (key) document.getElementById('api-key').value = key;
};
</script>
</body>
</html>
