<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QueryLogic | Ghost Protocol v3.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root { --lime: #c8f135; --bg: #050505; --card: #0d0d0b; --border: #1a1a16; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); color: #e8e8e0; -webkit-font-smoothing: antialiased; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass { background: var(--card); border: 1px solid var(--border); }
        .neon-text { color: var(--lime); text-shadow: 0 0 15px rgba(200, 241, 53, 0.3); }
        .terminal { background: #000; border: 1px solid #1a1a16; height: 220px; overflow-y: auto; padding: 15px; font-size: 11px; color: #666; }
        .terminal-entry { margin-bottom: 4px; border-bottom: 1px solid #0a0a0a; padding-bottom: 2px; }
        .terminal-error { color: #ef4444; }
        .terminal-success { color: var(--lime); }
        .terminal-attempt { color: #3b82f6; }
        .loader { width: 18px; height: 18px; border: 2px solid #222; border-top: 2px solid var(--lime); border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-12 px-4">

    <div class="w-full max-w-xl">
        <div class="mb-10 text-center">
            <h1 class="text-3xl font-extrabold tracking-tighter uppercase italic">Query<span class="neon-text">Logic</span></h1>
            <div class="inline-flex items-center gap-2 mt-2 px-3 py-1 border border-lime-500/20 rounded-full bg-lime-500/5">
                <span id="statusPulse" class="w-1.5 h-1.5 rounded-full bg-zinc-700"></span>
                <span class="text-[9px] font-mono text-zinc-500 uppercase tracking-widest">Ghost Protocol // Core v3.5</span>
            </div>
        </div>

        <div class="glass p-8 rounded-[32px] shadow-2xl space-y-6">
            <div class="grid grid-cols-1 gap-4">
                <div class="space-y-1">
                    <label class="text-[10px] uppercase font-bold text-zinc-500 ml-1">Ziel-URL</label>
                    <input type="url" id="targetUrl" placeholder="https://apple.com" class="w-full bg-black/50 border border-[#1a1a16] p-4 rounded-2xl outline-none focus:border-lime-500/50 transition-all text-white text-sm">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] uppercase font-bold text-zinc-500 ml-1">Master API Key</label>
                    <input type="password" id="apiKey" placeholder="Gemini API Key" class="w-full bg-black/50 border border-[#1a1a16] p-4 rounded-2xl outline-none focus:border-lime-500/50 transition-all text-white text-sm">
                </div>
            </div>

            <button id="runBtn" onclick="startGhostAudit()" class="w-full bg-[#c8f135] text-black font-black py-5 rounded-2xl hover:scale-[1.01] active:scale-[0.98] transition-all flex items-center justify-center gap-3">
                START SCAN
            </button>

            <div class="mt-4">
                <div id="terminal" class="terminal mono rounded-xl">
                    <div class="terminal-entry">> System bereit. Ghost Protocol aktiv.</div>
                </div>
            </div>
        </div>

        <div id="results" class="hidden grid grid-cols-2 gap-4 mt-8">
            <div class="glass p-8 rounded-[24px] text-center border-t border-lime-500/20">
                <span class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest">SEO Rating</span>
                <div id="seoVal" class="text-5xl font-black neon-text mt-2">--</div>
            </div>
            <div class="glass p-8 rounded-[24px] text-center border-t border-lime-500/20">
                <span class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest">Speed Score</span>
                <div id="perfVal" class="text-5xl font-black neon-text mt-2">--</div>
            </div>
        </div>
    </div>

    <script type="module">
        const term = document.getElementById('terminal');
        const btn = document.getElementById('runBtn');
        const pulse = document.getElementById('statusPulse');

        function addLog(msg, type = 'info') {
            const entry = document.createElement('div');
            entry.className = `terminal-entry ${type === 'error' ? 'terminal-error' : type === 'success' ? 'terminal-success' : type === 'attempt' ? 'terminal-attempt' : ''}`;
            entry.innerText = `> [${new Date().toLocaleTimeString()}] ${msg}`;
            term.appendChild(entry);
            term.scrollTop = term.scrollHeight;
        }

        async function startGhostAudit() {
            const url = document.getElementById('targetUrl').value.trim();
            const key = document.getElementById('apiKey').value.trim();

            if (!url || !key) {
                addLog("Fehler: Daten unvollständig.", "error");
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="loader"></span> SCANNING...';
            pulse.className = "w-1.5 h-1.5 rounded-full bg-blue-500 animate-pulse";
            
            // Umfassende Liste von Modell-Strings, die Google aktuell akzeptiert
            const modelPaths = [
                "gemini-1.5-flash-latest",
                "gemini-1.5-flash",
                "gemini-1.5-pro",
                "gemini-1.0-pro",
                "gemini-pro"
            ];

            let success = false;

            for (const mId of modelPaths) {
                if (success) break;
                addLog(`Checking Route: ${mId}...`, "attempt");

                try {
                    // Wir versuchen v1 UND v1beta dynamisch
                    const versions = ['v1', 'v1beta'];
                    
                    for (const ver of versions) {
                        if (success) break;
                        
                        const endpoint = `https://generativelanguage.googleapis.com/${ver}/models/${mId}:generateContent?key=${key}`;
                        
                        try {
                            const response = await fetch(endpoint, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({
                                    contents: [{ parts: [{ text: `Analysiere ${url}. Gib NUR JSON zurück: {"seo": 0-100, "perf": 0-100}` }] }]
                                })
                            });

                            const data = await response.json();

                            if (response.ok) {
                                const rawText = data.candidates[0].content.parts[0].text;
                                const json = JSON.parse(rawText.match(/\{.*\}/s)[0]);
                                
                                document.getElementById('seoVal').innerText = json.seo;
                                document.getElementById('perfVal').innerText = json.perf;
                                document.getElementById('results').classList.remove('hidden');

                                addLog(`ERFOLG! Aktive Route gefunden: ${ver}/${mId}`, "success");
                                pulse.className = "w-1.5 h-1.5 rounded-full bg-[#c8f135]";
                                success = true;
                            } else {
                                if (data.error?.message?.includes("429")) {
                                    addLog(`Quota für ${mId} erschöpft.`, "error");
                                    break; // Nächstes Modell versuchen
                                }
                            }
                        } catch (e) {
                            // Stiller Fail für einzelne Versionen
                        }
                    }
                } catch (err) {
                    addLog(`Route ${mId} instabil.`, "error");
                }
            }

            if (!success) {
                addLog("KRITISCH: Kein Modell reagiert. Check Key oder Quota.", "error");
                pulse.className = "w-1.5 h-1.5 rounded-full bg-red-600";
            }

            btn.disabled = false;
            btn.innerHTML = 'START SCAN';
        }

        window.startGhostAudit = startGhostAudit;
    </script>
</body>
</html>
