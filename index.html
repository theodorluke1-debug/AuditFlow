<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QueryLogic Pro | Production Ready</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root { --lime: #c8f135; --bg: #050505; --card: #0d0d0b; --border: #1a1a16; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg); 
            color: #e8e8e0; 
            -webkit-font-smoothing: antialiased;
        }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass { background: var(--card); border: 1px solid var(--border); }
        .neon-text { color: var(--lime); text-shadow: 0 0 15px rgba(200, 241, 53, 0.3); }
        
        .terminal {
            background: #000;
            border: 1px solid #1a1a16;
            height: 150px;
            overflow-y: auto;
            padding: 12px;
            font-size: 11px;
            color: #666;
        }
        .terminal-entry { margin-bottom: 4px; border-bottom: 1px solid #0a0a0a; padding-bottom: 2px; }
        .terminal-error { color: #ef4444; }
        .terminal-success { color: var(--lime); }
        
        input::placeholder { color: #333; }
        .loader {
            width: 18px; height: 18px;
            border: 2px solid #222;
            border-top: 2px solid var(--lime);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: inline-block;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-12 px-4">

    <div class="w-full max-w-xl">
        <div class="mb-10 text-center">
            <h1 class="text-3xl font-extrabold tracking-tighter uppercase italic">Query<span class="neon-text">Logic</span></h1>
            <div class="inline-flex items-center gap-2 mt-2 px-3 py-1 border border-lime-500/20 rounded-full bg-lime-500/5">
                <span class="w-1.5 h-1.5 rounded-full bg-lime-500 animate-pulse"></span>
                <span class="text-[9px] font-mono text-lime-500 uppercase tracking-widest">Global SaaS Deployment // Core v2.1</span>
            </div>
        </div>

        <div class="glass p-8 rounded-[32px] shadow-2xl space-y-6">
            <div class="grid grid-cols-1 gap-4">
                <div>
                    <label class="block text-[10px] font-bold uppercase tracking-widest text-zinc-500 mb-2 ml-1">Target URL</label>
                    <input type="url" id="targetUrl" placeholder="https://apple.com" 
                        class="w-full bg-black/50 border border-[#1a1a16] p-4 rounded-2xl outline-none focus:border-lime-500/50 transition-all text-white">
                </div>
                <div>
                    <label class="block text-[10px] font-bold uppercase tracking-widest text-zinc-500 mb-2 ml-1">AI Studio Key (Gemini)</label>
                    <input type="password" id="apiKey" placeholder="Enter API Key here..." 
                        class="w-full bg-black/50 border border-[#1a1a16] p-4 rounded-2xl outline-none focus:border-lime-500/50 transition-all text-white">
                </div>
            </div>

            <button id="runBtn" onclick="startProcess()" class="w-full bg-[#c8f135] text-black font-black py-5 rounded-2xl hover:scale-[1.01] active:scale-[0.98] transition-all flex items-center justify-center gap-3">
                EXECUTE AUDIT
            </button>

            <div class="mt-4">
                <div class="flex items-center justify-between mb-2 px-1">
                    <span class="text-[9px] font-bold uppercase text-zinc-600 tracking-widest">Real-time Diagnostic</span>
                    <div id="statusDot" class="w-1.5 h-1.5 rounded-full bg-zinc-800"></div>
                </div>
                <div id="terminal" class="terminal mono rounded-xl shadow-inner">
                    <div class="terminal-entry">> System idle. Awaiting user input...</div>
                </div>
            </div>
        </div>

        <div id="results" class="hidden grid grid-cols-2 gap-4 mt-8">
            <div class="glass p-8 rounded-[24px] text-center border-t border-lime-500/20">
                <span class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest">SEO Score</span>
                <div id="seoVal" class="text-5xl font-black neon-text mt-2">0</div>
            </div>
            <div class="glass p-8 rounded-[24px] text-center border-t border-lime-500/20">
                <span class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest">Speed Score</span>
                <div id="perfVal" class="text-5xl font-black neon-text mt-2">0</div>
            </div>
        </div>

        <footer class="mt-12 text-center text-[10px] text-zinc-700 font-mono uppercase tracking-[0.2em]">
            Operational Prep: Canada Arrival Aug 30
        </footer>
    </div>

    <script type="importmap">
    {
        "imports": {
            "@google/generative-ai": "https://esm.run/@google/generative-ai"
        }
    }
    </script>

    <script type="module">
        import { GoogleGenerativeAI } from "@google/generative-ai";

        const term = document.getElementById('terminal');
        const btn = document.getElementById('runBtn');
        const dot = document.getElementById('statusDot');
        const results = document.getElementById('results');

        function addLog(msg, type = 'info') {
            const entry = document.createElement('div');
            entry.className = `terminal-entry ${type === 'error' ? 'terminal-error' : type === 'success' ? 'terminal-success' : ''}`;
            entry.innerText = `> [${new Date().toLocaleTimeString()}] ${msg}`;
            term.appendChild(entry);
            term.scrollTop = term.scrollHeight;
        }

        async function startProcess() {
            const urlInput = document.getElementById('targetUrl').value.trim();
            const keyInput = document.getElementById('apiKey').value.trim();

            if (!urlInput || !keyInput) {
                addLog("Execution halted: Input missing.", "error");
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="loader"></span> ANALYZING...';
            dot.className = "w-1.5 h-1.5 rounded-full bg-blue-500 animate-pulse";
            results.classList.add('hidden');
            addLog(`Starte Audit-Sequenz für ${urlInput}...`);

            // REALE MODELLE (Stand April 2026)
            // KEINE FANTASIE-NAMEN WIE gemini-2.5-flash-lite VERWENDEN
            const modelSequence = ['gemini-2.0-flash', 'gemini-1.5-flash'];
            let auditComplete = false;

            for (const mId of modelSequence) {
                if (auditComplete) break;
                addLog(`Versuche Verbindung zu: ${mId}`);

                try {
                    const genAI = new GoogleGenerativeAI(keyInput);
                    const model = genAI.getGenerativeModel({ 
                        model: mId,
                        generationConfig: { 
                            responseMimeType: "application/json",
                            temperature: 0.2
                        }
                    });

                    // Prompt mit strikter JSON-Anforderung
                    const prompt = `Führe ein technisches Audit für die Website ${urlInput} durch. Gib EXKLUSIV ein JSON-Objekt zurück: {"seo": Zahl, "perf": Zahl}. Keine Einleitung, keine Markdown-Blöcke.`;
                    
                    const result = await model.generateContent(prompt);
                    const response = await result.response;
                    const text = response.text().trim();
                    
                    // Robustes JSON-Parsing
                    const cleanJson = text.replace(/```json|```/g, "").trim();
                    const data = JSON.parse(cleanJson);

                    document.getElementById('seoVal').innerText = data.seo || 0;
                    document.getElementById('perfVal').innerText = data.perf || 0;
                    
                    addLog(`Handshake erfolgreich via ${mId}. Daten verarbeitet.`, "success");
                    results.classList.remove('hidden');
                    dot.className = "w-1.5 h-1.5 rounded-full bg-[#c8f135]";
                    auditComplete = true;

                } catch (err) {
                    addLog(`Modell ${mId} fehlgeschlagen: ${err.message}`, "error");
                    if (err.message.includes("API_KEY_INVALID") || err.message.includes("403")) {
                        addLog("KRITISCH: API-Key ist ungültig oder nicht autorisiert.", "error");
                        break; 
                    }
                }
            }

            if (!auditComplete) {
                addLog("SYSTEMFEHLER: Alle Verbindungsversuche fehlgeschlagen.", "error");
                dot.className = "w-1.5 h-1.5 rounded-full bg-red-600";
            }

            btn.disabled = false;
            btn.innerHTML = 'EXECUTE AUDIT';
        }

        window.startProcess = startProcess;
    </script>
</body>
</html>
