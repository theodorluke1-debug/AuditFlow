<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QueryLogic — Professional AI Audit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    --lime: #c8f135;
    --bg: #0d0d0b;
    --bg-card: #131310;
    --border: #2a2a24;
    --text: #e8e8e0;
    --text-dim: #9b9b90;
    --error: #f87171;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    line-height: 1.6;
  }

  header {
    padding: 20px 40px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--bg);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo { font-weight: 800; font-size: 1.2rem; letter-spacing: -0.05em; text-transform: uppercase; }
  .logo span { color: var(--lime); }

  main {
    max-width: 900px;
    margin: 60px auto;
    padding: 0 20px;
  }

  .hero { text-align: center; margin-bottom: 60px; }
  h1 { font-size: 3.5rem; font-weight: 800; letter-spacing: -0.04em; margin-bottom: 16px; }
  .hero p { color: var(--text-dim); font-size: 1.2rem; }

  .audit-box {
    background: var(--bg-card);
    border: 1px solid var(--border);
    padding: 30px;
    border-radius: 24px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
  }

  .input-container {
    display: flex;
    gap: 12px;
    background: #1a1a16;
    padding: 10px;
    border-radius: 16px;
    border: 1px solid var(--border);
    margin-bottom: 20px;
  }

  input {
    flex: 1;
    background: transparent;
    border: none;
    color: white;
    padding: 10px 15px;
    font-size: 1rem;
    outline: none;
  }

  .btn {
    background: var(--lime);
    color: black;
    border: none;
    padding: 12px 30px;
    border-radius: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn:hover { transform: scale(1.02); opacity: 0.9; }
  .btn:disabled { background: #333; color: #666; cursor: not-allowed; }

  .settings {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 10px;
    font-size: 0.8rem;
    color: var(--text-dim);
  }

  .settings input {
    border-bottom: 1px solid var(--border);
    width: 250px;
    padding: 2px;
    font-size: 0.8rem;
  }

  #error-log {
    margin-top: 20px;
    padding: 15px;
    background: rgba(248, 113, 113, 0.1);
    border: 1px solid var(--error);
    border-radius: 12px;
    color: var(--error);
    display: none;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    text-align: left;
  }

  .results-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    margin-top: 50px;
    display: none;
  }

  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    padding: 25px;
    border-radius: 20px;
  }

  .score {
    font-size: 2.5rem;
    font-weight: 800;
    color: var(--lime);
    font-family: 'JetBrains Mono', monospace;
    margin-bottom: 10px;
  }

  .loader {
    display: none;
    margin: 20px auto;
    width: 30px;
    height: 30px;
    border: 3px solid var(--border);
    border-top-color: var(--lime);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>
  <div class="logo">QUERY<span>LOGIC</span></div>
</header>

<main>
  <div class="hero">
    <h1>Smart Website <span style="color:var(--lime)">Audits.</span></h1>
    <p>Forensische Analyse durch Google Gemini 1.5 Flash.</p>
  </div>

  <div class="audit-box">
    <div class="input-container">
      <input type="url" id="url-input" placeholder="https://beispiel.de" required>
      <button class="btn" id="run-btn" onclick="startAudit()">Audit starten</button>
    </div>
    
    <div class="settings">
      <div>API KEY: <input type="password" id="api-key" placeholder="Hier Key einfügen"></div>
    </div>

    <div class="loader" id="loader"></div>
    <div id="error-log"></div>
  </div>

  <div id="results" class="results-grid">
    <div class="card">
      <div class="score" id="s-seo">0</div>
      <h3>SEO Score</h3>
      <p id="t-seo" style="color:var(--text-dim); font-size:0.85rem; margin-top:10px;"></p>
    </div>
    <div class="card">
      <div class="score" id="s-perf">0</div>
      <h3>Performance</h3>
      <p id="t-perf" style="color:var(--text-dim); font-size:0.85rem; margin-top:10px;"></p>
    </div>
    <div class="card">
      <div class="score" id="s-ux">0</div>
      <h3>UX / Design</h3>
      <p id="t-ux" style="color:var(--text-dim); font-size:0.85rem; margin-top:10px;"></p>
    </div>
  </div>
</main>

<script>
async function startAudit() {
  const url = document.getElementById('url-input').value;
  const key = document.getElementById('api-key').value || localStorage.getItem('gemini_key');
  const btn = document.getElementById('run-btn');
  const loader = document.getElementById('loader');
  const errorLog = document.getElementById('error-log');
  const results = document.getElementById('results');

  if (!url || !key) {
    alert("Bitte URL und API-Key eingeben!");
    return;
  }

  // UI Reset
  localStorage.setItem('gemini_key', key);
  btn.disabled = true;
  loader.style.display = 'block';
  errorLog.style.display = 'none';
  results.style.display = 'none';

  try {
    // Schritt 1: Website-Inhalt simulieren/laden
    // Da CORS echtes Scrapen im Browser verbietet, schicken wir die URL an Gemini
    // Gemini kann URLs (eingeschränkt) selbst aufrufen oder wir nutzen den URL-Kontext.
    
    const systemPrompt = "Du bist ein Website Auditor. Analysiere die URL und gib ein JSON zurück. KEIN TEXT drumherum.";
    const userPrompt = `Analysiere die Website ${url}. Gib mir ein JSON Objekt zurück: {"seo": 0-100, "seo_txt": "...", "perf": 0-100, "perf_txt": "...", "ux": 0-100, "ux_txt": "..."}`;

    // Wir probieren erst Flash (schnell), dann Pro
    const models = ["gemini-1.5-flash", "gemini-1.5-pro"];
    let finalData = null;
    let lastError = "";

    for (const model of models) {
      try {
        const apiEndpoint = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`;
        const response = await fetch(apiEndpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{ parts: [{ text: userPrompt }] }],
            systemInstruction: { parts: [{ text: systemPrompt }] },
            generationConfig: { 
                responseMimeType: "application/json",
                temperature: 0.1 
            }
          })
        });

        if (!response.ok) {
          const errJson = await response.json();
          lastError = `${model}: ${errJson.error?.message || response.statusText}`;
          continue;
        }

        const data = await response.json();
        const rawText = data.candidates?.[0]?.content?.parts?.[0]?.text;
        finalData = JSON.parse(rawText.replace(/```json/g, "").replace(/```/g, ""));
        break; 
      } catch (e) {
        lastError = e.message;
      }
    }

    if (!finalData) throw new Error(lastError);

    // Ergebnisse anzeigen
    document.getElementById('s-seo').innerText = finalData.seo;
    document.getElementById('t-seo').innerText = finalData.seo_txt;
    document.getElementById('s-perf').innerText = finalData.perf;
    document.getElementById('t-perf').innerText = finalData.perf_txt;
    document.getElementById('s-ux').innerText = finalData.ux;
    document.getElementById('t-ux').innerText = finalData.ux_txt;

    results.style.display = 'grid';

  } catch (err) {
    errorLog.style.display = 'block';
    errorLog.innerText = "FEHLER: " + err.message + "\n\nTip: Prüfe ob dein Key bei Google AI Studio aktiv ist und erstelle ggf. einen NEUEN Key.";
  } finally {
    btn.disabled = false;
    loader.style.display = 'none';
  }
}

// Key beim Start laden
window.onload = () => {
  const saved = localStorage.getItem('gemini_key');
  if (saved) document.getElementById('api-key').value = saved;
};
</script>

</body>
</html>
