<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QueryLogic — Debug Mode</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
<style>
  :root { --lime: #c8f135; --bg: #0d0d0b; --card: #131310; --border: #2a2a24; --text: #e8e8e0; --error: #f87171; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; padding: 40px 20px; }
  .container { max-width: 600px; margin: 0 auto; text-align: center; }
  .box { background: var(--card); border: 1px solid var(--border); padding: 30px; border-radius: 20px; margin-top: 20px; }
  input { width: 100%; background: #1a1a16; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 10px; margin-bottom: 15px; outline: none; }
  .btn { width: 100%; background: var(--lime); color: black; border: none; padding: 15px; border-radius: 10px; font-weight: 800; cursor: pointer; }
  #log { margin-top: 20px; padding: 15px; background: #000; border-radius: 10px; color: #888; font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; text-align: left; display: none; white-space: pre-wrap; }
  .res-card { display: none; margin-top: 20px; padding: 20px; border: 1px solid var(--lime); border-radius: 15px; text-align: left; }
</style>
</head>
<body>

<div class="container">
  <h1 style="font-size: 2.5rem;">Query<span>Logic</span></h1>
  <p style="color: #666;">Debug-Version zur Fehleranalyse</p>

  <div class="box">
    <input type="url" id="target" placeholder="https://beispiel.de">
    <input type="password" id="key" placeholder="API Key hier einfügen">
    <button class="btn" onclick="run()">Audit starten</button>
  </div>

  <div id="log"></div>

  <div id="res" class="res-card">
    <h2 id="score" style="color:var(--lime); font-size: 2rem;">0/100</h2>
    <p id="desc"></p>
  </div>
</div>

<script>
function writeLog(msg) {
  const log = document.getElementById('log');
  log.style.display = 'block';
  log.innerText += "\n> " + msg;
}

async function run() {
  const url = document.getElementById('target').value;
  const key = document.getElementById('key').value;
  const log = document.getElementById('log');
  const res = document.getElementById('res');
  
  log.innerText = "System-Check gestartet...";
  res.style.display = 'none';

  if(!key) { writeLog("FEHLER: Kein Key angegeben."); return; }

  // Liste der Endpunkte, die wir testen
  const configs = [
    { model: "gemini-1.5-flash", ver: "v1beta" },
    { model: "gemini-1.5-flash-latest", ver: "v1beta" },
    { model: "gemini-1.5-pro", ver: "v1" }
  ];

  let success = false;

  for (let conf of configs) {
    if(success) break;
    writeLog(`Teste Modell: ${conf.model} (${conf.ver})...`);
    
    try {
      const api = `https://generativelanguage.googleapis.com/${conf.ver}/models/${conf.model}:generateContent?key=${key}`;
      const response = await fetch(api, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [{ text: `Analysiere kurz SEO für ${url}. Antworte NUR JSON: {"score": 80, "txt": "Gut"}` }] }]
        })
      });

      const data = await response.json();

      if (!response.ok) {
        writeLog(`Status ${response.status}: ${data.error?.message || "Unbekannter Fehler"}`);
        continue;
      }

      const text = data.candidates[0].content.parts[0].text;
      const clean = JSON.parse(text.replace(/```json|```/g, "").trim());
      
      document.getElementById('score').innerText = clean.score + "/100";
      document.getElementById('desc').innerText = clean.txt;
      res.style.display = 'block';
      writeLog("ERFOLG!");
      success = true;
    } catch (e) {
      writeLog("Crash: " + e.message);
    }
  }

  if(!success) writeLog("ALLE VERSUCHE FEHLGESCHLAGEN. Bitte Key in Google AI Studio prüfen.");
}
</script>
</body>
</html>
