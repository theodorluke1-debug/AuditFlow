<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QueryLogic | Ultra Stable Core</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root { --lime: #c8f135; --bg: #050505; --card: #0d0d0b; --border: #1a1a16; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); color: #e8e8e0; -webkit-font-smoothing: antialiased; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass { background: var(--card); border: 1px solid var(--border); }
        .neon-text { color: var(--lime); text-shadow: 0 0 15px rgba(200, 241, 53, 0.3); }
        .terminal { background: #000; border: 1px solid #1a1a16; height: 220px; overflow-y: auto; padding: 15px; font-size: 11px; color: #666; }
        .terminal-entry { margin-bottom: 6px; border-bottom: 1px solid #0a0a0a; padding-bottom: 4px; line-height: 1.5; }
        .terminal-error { color: #ff4444; border-left: 2px solid #ff4444; padding-left: 8px; }
        .terminal-success { color: var(--lime); border-left: 2px solid var(--lime); padding-left: 8px; }
        .terminal-info { color: #3b82f6; border-left: 2px solid #3b82f6; padding-left: 8px; }
        .loader { width: 18px; height: 18px; border: 2px solid #222; border-top: 2px solid var(--lime); border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-12 px-4">

    <div class="w-full max-w-xl">
        <!-- Brand Header -->
        <div class="mb-10 text-center">
            <h1 class="text-3xl font-extrabold tracking-tighter uppercase italic">Query<span class="neon-text">Logic</span></h1>
            <div class="inline-flex items-center gap-2 mt-2 px-3 py-1 border border-lime-500/20 rounded-full bg-lime-500/5">
                <span id="statusPulse" class="w-1.5 h-1.5 rounded-full bg-zinc-700"></span>
                <span class="text-[9px] font-mono text-zinc-500 uppercase tracking-widest">SaaS Engine v3.0 // Multi-Route Architecture</span>
            </div>
        </div>

        <!-- Main Card -->
        <div class="glass p-8 rounded-[32px] shadow-2xl space-y-6">
            <div class="grid grid-cols-1 gap-4">
                <div class="space-y-1">
                    <label class="text-[10px] uppercase font-bold text-zinc-500 ml-1">Ziel-URL</label>
                    <input type="url" id="targetUrl" placeholder="https://beispiel.de" class="w-full bg-black/50 border border-[#1a1a16] p-4 rounded-2xl outline-none focus:border-lime-500/50 transition-all text-white text-sm">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] uppercase font-bold text-zinc-500 ml-1">API-Key</label>
                    <input type="password" id="apiKey" placeholder="Dein Gemini API Key" class="w-full bg-black/50 border border-[#1a1a16] p-4 rounded-2xl outline-none focus:border-lime-500/50 transition-all text-white text-sm">
                </div>
            </div>

            <button id="runBtn" onclick="runEnhancedAudit()" class="w-full bg-[#c8f135] text-black font-black py-5 rounded-2xl hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-center gap-3">
                AUDIT STARTEN
            </button>

            <!-- Diagnostic Center -->
            <div class="mt-4">
                <div id="terminal" class="terminal mono rounded-xl shadow-inner">
                    <div class="terminal-entry text-zinc-400 font-bold uppercase tracking-wider">/ Initialisiere Diagnostik...</div>
                    <div class="terminal-entry">Warte auf Benutzereingabe.</div>
                </div>
            </div>
        </div>

        <!-- Data Visualization -->
        <div id="results" class="hidden grid grid-cols-2 gap-4 mt-8">
            <div class="glass p-8 rounded-[24px] text-center border-b-2 border-transparent hover:border-lime-500 transition-colors">
                <span class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest">SEO Score</span>
                <div id="seoVal" class="text-5xl font-black neon-text mt-2">--</div>
            </div>
            <div class="glass p-8 rounded-[24px] text-center border-b-2 border-transparent hover:border-lime-500 transition-colors">
                <span class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest">Performance</span>
                <div id="perfVal" class="text-5xl font-black neon-text mt-2">--</div>
            </div>
        </div>
    </div>

    <script type="module">
        const term = document.getElementById('terminal');
        const btn = document.getElementById('runBtn');
        const pulse = document.getElementById('statusPulse');

        function log(msg, type = 'info') {
            const entry = document.createElement('div');
            entry.className = `terminal-entry ${type === 'error' ? 'terminal-error' : type === 'success' ? 'terminal-success' : 'terminal-info'}`;
            entry.innerText = `> [${new Date().toLocaleTimeString()}] ${msg}`;
            term.appendChild(entry);
            term.scrollTop = term.scrollHeight;
        }

        async function runEnhancedAudit() {
            const url = document.getElementById('targetUrl').value.trim();
            const key = document.getElementById('apiKey').value.trim();

            if (!url || !key) {
                log("Eingabefehler: URL oder Key fehlt.", "error");
                return;
            }

            // UI Lockdown
            btn.disabled = true;
            btn.innerHTML = '<span class="loader"></span> ANALYSIERE...';
            pulse.className = "w-1.5 h-1.5 rounded-full bg-blue-500 animate-pulse";
            document.getElementById('results').classList.add('hidden');
            
            // MULTI-ROUTE ENGINE (v1 ist Produktionsstandard)
            const routingOptions = [
                { model: 'gemini-1.5-flash', api: 'v1' },
                { model: 'gemini-1.5-pro', api: 'v1' },
                { model: 'gemini-2.0-flash-exp', api: 'v1beta' } // Fallback für Exp-Features
            ];

            let success = false;

            for (const route of routingOptions) {
                if (success) break;
                log(`Versuche Route: ${route.model} über ${route.api}...`);

                try {
                    const endpoint = `https://generativelanguage.googleapis.com/${route.api}/models/${route.model}:generateContent?key=${key}`;
                    
                    const response = await fetch(endpoint, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{
                                parts: [{
                                    text: `Führe eine technische SEO- und Speed-Analyse für die Website ${url} durch. Antworte ausschließlich im JSON-Format: {"seo": Zahl(0-100), "perf": Zahl(0-100)}. Kein weiterer Text.`
                                }]
                            }],
                            generationConfig: { temperature: 0.1 }
                        })
                    });

                    const data = await response.json();

                    if (!response.ok) {
                        const errStatus = response.status;
                        const errType = data.error?.status || "UNKNOWN";
                        const errMsg = data.error?.message || "Unbekannter Serverfehler";
                        
                        log(`Route ${route.model} blockiert: ${errType} (${errStatus})`, "error");
                        
                        if (errStatus === 429) log("TIPP: Quota Limit. Warte 60s.", "error");
                        continue; // Nächste Route versuchen
                    }

                    // Extrahierungssicherheit
                    const rawContent = data.candidates[0].content.parts[0].text;
                    const jsonMatch = rawContent.match(/\{[\s\S]*\}/);
                    
                    if (!jsonMatch) throw new Error("Formatfehler in der KI-Antwort.");
                    
                    const scores = JSON.parse(jsonMatch[0]);

                    // UI Erfolg
                    document.getElementById('seoVal').innerText = scores.seo;
                    document.getElementById('perfVal').innerText = scores.perf;
                    document.getElementById('results').classList.remove('hidden');

                    log(`Audit erfolgreich abgeschlossen über ${route.model}`, "success");
                    pulse.className = "w-1.5 h-1.5 rounded-full bg-[#c8f135]";
                    success = true;

                } catch (err) {
                    log(`Kritischer Routenfehler: ${err.message.substring(0, 60)}`, "error");
                }
            }

            if (!success) {
                log("FEHLER: Alle neuralen Routen sind derzeit blockiert.", "error");
                pulse.className = "w-1.5 h-1.5 rounded-full bg-red-600";
            }

            btn.disabled = false;
            btn.innerHTML = 'AUDIT STARTEN';
        }

        window.runEnhancedAudit = runEnhancedAudit;
    </script>
</body>
</html>
